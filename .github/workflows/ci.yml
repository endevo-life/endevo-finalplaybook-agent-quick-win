name: CI

# Quality gates on every PR and push to main. Nothing reaches main without
# passing these. Jobs run in parallel; each is independent and cached.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/**]

# Cancel superseded runs on the same ref (save CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Python / FastAPI ──────────────────────────────────────────────
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (hermetic — in-memory store, no AWS/LLM)
        # conftest.py forces STORE_BACKEND=memory + AUTH_BACKEND=local, so these
        # never touch AWS. LLM-backed acceptance tests auto-skip without a key.
        run: python -m pytest tests/ -v --tb=short

  # ── Backend: import + smoke (catches packaging/wiring breaks) ───────────────
  backend-smoke:
    name: Backend · import smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt
      - run: pip install -r requirements.txt
      - name: App imports cleanly (rules engine loads content library)
        env:
          STORE_BACKEND: memory
          AUTH_BACKEND: local
        run: python -c "from app.main import app; print('app OK, routes:', len(app.routes))"

  # ── Frontend: lint + build ─────────────────────────────────────────────────
  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test
      - name: Build
        run: npm run build

  # ── Security: dependency + secret scanning ─────────────────────────────────
  security:
    name: Security · audit + secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan commits
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (frontend, high+ only)
        working-directory: frontend
        run: npm audit --audit-level=high || true  # report, don't block (advisory)
      - name: pip-audit (backend)
        run: |
          python -m pip install pip-audit
          pip-audit -r agent/requirements.txt || true  # report, don't block
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
