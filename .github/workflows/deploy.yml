name: Deploy

# Auto-deploy to AWS on merge to main. Backend (SAM: Lambda + API) then the
# frontend (S3 + CloudFront). Runs ONLY after CI passes on main.
#
# Requires these GitHub repository secrets (Settings → Secrets and variables →
# Actions):
#   AWS_ACCESS_KEY_ID      — deploy IAM user
#   AWS_SECRET_ACCESS_KEY  — deploy IAM user
#   ADMIN_TOKEN            — admin console secret
#   ANTHROPIC_API_KEY      — (optional; only if LlmBackend=anthropic. Bedrock needs none)
#
# Can also be run manually from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel a deploy mid-flight

env:
  AWS_REGION: us-east-1
  STACK_NAME: mfp-dev
  API_URL: https://xlzj6dntz0.execute-api.us-east-1.amazonaws.com
  FRONTEND_BUCKET: mfp-dev-frontend
  CLOUDFRONT_URL: https://d3m7jok0qoyofy.cloudfront.net

jobs:
  deploy-backend:
    name: Deploy backend (SAM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Sync knowledge base into the Lambda package
        run: |
          mkdir -p agent/knowledge-base
          cp -r knowledge-base/* agent/knowledge-base/
      - name: SAM build
        working-directory: infra
        run: sam build
      - name: SAM deploy
        working-directory: infra
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "LlmBackend=bedrock" \
              "BedrockRegion=us-east-1" \
              "BedrockModelId=us.meta.llama3-1-8b-instruct-v1:0" \
              "AuthBackend=cognito" \
              "CognitoUserPoolId=us-east-1_ikCfp5RAL" \
              "CognitoClientId=2hsqh99bm3l6hqj9uskbtbgdgd" \
              "CognitoRegion=us-east-1" \
              "AdminToken=${{ secrets.ADMIN_TOKEN }}" \
              "AdminEmails=hello@endevo.life,bluesproutagency@gmail.com" \
              "AllowDevUpgrade=true" \
              "AllowedOrigins=http://localhost:3200,${CLOUDFRONT_URL}" \
              "AppBaseUrl=${CLOUDFRONT_URL}"
      - name: Smoke test the live API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/api/health")
          echo "health: $code"
          test "$code" = "200"

  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend   # backend first, so the API is ready
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install + build (pointed at live API)
        working-directory: frontend
        run: |
          npm ci
          VITE_API_BASE_URL="$API_URL" npm run build
      - name: Upload to S3
        working-directory: frontend
        run: |
          # long-cache hashed assets, no-cache the HTML so new deploys show up
          aws s3 sync dist "s3://$FRONTEND_BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable" --exclude "*.html"
          aws s3 sync dist "s3://$FRONTEND_BUCKET" \
            --cache-control "no-cache" --exclude "*" --include "*.html"
      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, '${CLOUDFRONT_URL}') || DomainName=='${CLOUDFRONT_URL#https://}'].Id | [0]" \
            --output text)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            # fall back to the frontend stack output
            DIST_ID=$(aws cloudformation describe-stacks --stack-name mfp-dev-frontend \
              --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue | [0]" --output text)
          fi
          echo "invalidating $DIST_ID"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
