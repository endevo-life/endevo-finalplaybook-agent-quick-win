AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Final Playbook API -- FastAPI (via Mangum) on Lambda behind API Gateway, with
  seven prefixed DynamoDB tables (users/sessions/usage/plans/chat/events/config)
  for entitlements, usage metering, saved plans, chat history, and B2C analytics.
  The deterministic rules engine (free tier) and the one paid-tier LLM call run
  inside the same function; free-tier requests never touch the LLM. Auth is
  AWS Cognito (custom-auth email codes) against a pool created outside this
  template -- pass its IDs in as parameters.

Parameters:
  TablePrefix:
    Type: String
    Default: "mfp-dev-"
    Description: >
      Prefix for all 7 DynamoDB tables (matches DDB_TABLE_PREFIX). Creates
      {prefix}users, sessions, usage, plans, chat, events, config.
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Anthropic API key for the paid-tier personalization/chat calls.
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe secret key (sk_live_/sk_test_). Leave blank to run without billing.
  StripePriceId:
    Type: String
    Default: ""
    Description: Stripe recurring Price ID for the paid tier (price_...).
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (whsec_...).
  AllowedOrigins:
    Type: String
    Default: "http://localhost:3200"
    Description: Comma-separated list of allowed CORS origins (your frontend URL).
  AppBaseUrl:
    Type: String
    Default: "http://localhost:3200"
    Description: Where Stripe Checkout redirects users back to.
  AuthBackend:
    Type: String
    Default: "cognito"
    AllowedValues: ["local", "cognito"]
    Description: >
      "local" -- in-process login codes (zero AWS, dev only).
      "cognito" -- AWS Cognito custom-auth email codes (requires the pool/client
      params below to point at an already-created pool).
  AuthReturnCode:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      "true" returns the login code in the API response (no email provider
      needed; local dev only -- never set true in prod). "false" relies on
      Cognito/SES to email the code.
  CognitoUserPoolId:
    Type: String
    Default: ""
    Description: >
      Existing Cognito user pool id (e.g. us-east-1_XXXXXXXXX). This template
      does NOT create the pool or its custom-auth Lambda triggers -- create
      those separately, then pass the IDs in here. Required when AuthBackend=cognito.
  CognitoClientId:
    Type: String
    Default: ""
    Description: Existing Cognito app client id. Required when AuthBackend=cognito.
  CognitoRegion:
    Type: String
    Default: "us-east-1"
    Description: Region the Cognito user pool lives in.
  AdminToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Shared bearer secret gating /api/admin/* and the admin console. Leave
      blank to disable the admin API (it returns 503 until this is set).
  AdminEmails:
    Type: String
    Default: ""
    Description: >
      Comma-separated allowlist of admin emails. When set, admin login
      requires both AdminToken and one of these emails. Leave blank to gate
      on the token alone.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}users"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}sessions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  UsageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}usage"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
        - AttributeName: month
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
        - AttributeName: month
          KeyType: RANGE

  PlansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}plans"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  ChatTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}chat"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
        - AttributeName: ts
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
        - AttributeName: ts
          KeyType: RANGE

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}events"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: plane
          AttributeType: S
        - AttributeName: ts_id
          AttributeType: S
      KeySchema:
        - AttributeName: plane
          KeyType: HASH
        - AttributeName: ts_id
          KeyType: RANGE

  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}config"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../agent/
      Handler: lambda_handler.handler
      Environment:
        Variables:
          STORE_BACKEND: dynamodb
          DDB_TABLE_PREFIX: !Ref TablePrefix
          AWS_DEFAULT_REGION: !Ref AWS::Region
          LLM_BACKEND: anthropic
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_PRICE_ID: !Ref StripePriceId
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          APP_BASE_URL: !Ref AppBaseUrl
          AUTH_BACKEND: !Ref AuthBackend
          AUTH_RETURN_CODE: !Ref AuthReturnCode
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          COGNITO_REGION: !Ref CognitoRegion
          ADMIN_TOKEN: !Ref AdminToken
          ADMIN_EMAILS: !Ref AdminEmails
          ALLOW_DEV_UPGRADE: "false"
          PRODUCT_NAME: "Final Playbook"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlansTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
              Resource: "*"
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiBase:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: Base URL of the deployed API. Set this as VITE_API_BASE_URL for the frontend.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TablePrefix:
    Description: DynamoDB table prefix in use.
    Value: !Ref TablePrefix
