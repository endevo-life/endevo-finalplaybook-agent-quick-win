AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Final Playbook API -- FastAPI (via Mangum) on Lambda behind API Gateway, with a
  single DynamoDB table for users, entitlements, sessions, and usage metering.
  The deterministic rules engine (free tier) and the one paid-tier LLM call run
  inside the same function; free-tier requests never touch the LLM.

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for the paid-tier personalization/chat calls.
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe secret key (sk_live_/sk_test_). Leave blank to run without billing.
  StripePriceId:
    Type: String
    Default: ""
    Description: Stripe recurring Price ID for the paid tier (price_...).
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (whsec_...).
  AllowedOrigins:
    Type: String
    Default: "http://localhost:5173"
    Description: Comma-separated list of allowed CORS origins (your frontend URL).
  AppBaseUrl:
    Type: String
    Default: "http://localhost:5173"
    Description: Where Stripe Checkout redirects users back to.
  AuthReturnCode:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      "true" returns the login code in the API response (no email provider needed).
      Set "false" once you wire up email delivery so codes are emailed, not returned.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12

Resources:
  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: final-playbook
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at   # auto-expires session rows
        Enabled: true

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../agent/
      Handler: lambda_handler.handler
      Environment:
        Variables:
          STORE_BACKEND: dynamodb
          DDB_TABLE: !Ref DataTable
          LLM_BACKEND: anthropic
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_PRICE_ID: !Ref StripePriceId
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          APP_BASE_URL: !Ref AppBaseUrl
          AUTH_RETURN_CODE: !Ref AuthReturnCode
          PRODUCT_NAME: "Final Playbook"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiBase:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: Base URL of the deployed API. Set this as VITE_API_BASE_URL for the frontend.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Description: DynamoDB table name.
    Value: !Ref DataTable
