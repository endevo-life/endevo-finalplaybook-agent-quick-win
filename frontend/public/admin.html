<!doctype html>
<html>
<head>
<meta charset="utf-8"><title>MyFinalPlaybook — Operator Console</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
 :root{--ink:#161f33;--body:#4a5468;--dim:#8b92a3;--line:#e3e1d9;--brand:#1b2a4a;--brand-lt:#e9e2d2;--accent:#b08d57;--bg:#fafaf9;--surf:#fff;--ok:#2e7d47;--warn:#a6423a}
 *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink)}
 header{background:var(--surf);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
 header .t{font-weight:700} .plane{font-size:11px;background:var(--brand-lt);color:var(--brand);border-radius:10px;padding:2px 9px;font-weight:700;margin-left:8px}
 main{max-width:1000px;margin:0 auto;padding:24px}
 .card{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px}
 h2{font-size:16px;margin:0 0 14px} h3{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px}
 .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
 .stat{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px}
 .stat .n{font-size:28px;font-weight:700;color:var(--brand)} .stat .l{font-size:12px;color:var(--dim);margin-top:2px}
 .funnel .row{display:flex;align-items:center;gap:10px;margin:6px 0}
 .funnel .bar{height:22px;background:var(--brand);border-radius:5px;min-width:2px}
 .funnel .lbl{width:170px;font-size:13px} .funnel .c{font-size:13px;color:var(--dim)}
 table{width:100%;border-collapse:collapse;font-size:13px} th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
 th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase}
 .pill{font-size:11px;font-weight:700;border-radius:10px;padding:2px 9px}
 .pill.paid{background:var(--accent);color:#fff} .pill.free{background:var(--brand-lt);color:var(--brand)}
 button{background:var(--brand);color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
 button.ghost{background:transparent;color:var(--body);border:1px solid var(--line)}
 input{border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;width:100%}
 .login{max-width:360px;margin:80px auto} .err{color:var(--warn);font-size:13px;margin-top:8px}
 .done{color:var(--ok)} .todo{color:var(--dim)}
 a{color:var(--brand)}
 /* charts */
 .chartgrid{display:grid;grid-template-columns:2fr 1fr;gap:18px}
 @media(max-width:720px){.chartgrid{grid-template-columns:1fr}}
 .legend{display:flex;gap:16px;margin:10px 0 4px;font-size:12px;color:var(--body)}
 .legend .k{display:inline-flex;align-items:center;gap:6px}
 .legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
 .chart svg{width:100%;height:auto;overflow:visible}
 .chart .axis{font-size:10px;fill:var(--dim)}
 .chart .grid{stroke:var(--line);stroke-width:1}
 .chart .dot{cursor:pointer}
 .tip{position:fixed;background:var(--ink);color:#fff;font-size:12px;padding:6px 9px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .1s;z-index:50;white-space:nowrap}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BASE = "http://localhost:8001";
const TK = "fp_admin_token";
const EM = "fp_admin_email";
let token = localStorage.getItem(TK) || "";
let adminEmail = localStorage.getItem(EM) || "";

async function api(path, opts={}){
  const res = await fetch(BASE+path, {...opts, headers:{...(opts.body?{"Content-Type":"application/json"}:{}), Authorization:"Bearer "+token, "X-Admin-Email":adminEmail, ...(opts.headers||{})}});
  const data = await res.json().catch(()=>null);
  if(!res.ok){ const e=new Error((data&&data.detail)||("HTTP "+res.status)); e.status=res.status; throw e; }
  return data;
}
const el = document.getElementById("app");
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function loginView(msg){
  el.innerHTML = `<div class="login card"><h2>Operator Console</h2>
    <p style="color:var(--dim);font-size:13px">Enter your admin email and the admin token to sign in.</p>
    <input id="em" type="email" placeholder="admin email" value="${esc(adminEmail)}" style="margin-bottom:8px">
    <input id="tok" type="password" placeholder="admin token" value="${esc(token)}">
    <button style="margin-top:12px;width:100%" onclick="doLogin()">Sign in →</button>
    ${msg?`<p class="err">${esc(msg)}</p>`:""}</div>`;
}
async function doLogin(){
  adminEmail = document.getElementById("em").value.trim().toLowerCase();
  token = document.getElementById("tok").value.trim();
  try{ await api("/api/admin/login",{method:"POST",body:"{}"}); localStorage.setItem(TK,token); localStorage.setItem(EM,adminEmail); dashboard(); }
  catch(e){ loginView(e.status===401?"Invalid token or email.":e.message); }
}
function logout(){ token=""; adminEmail=""; localStorage.removeItem(TK); localStorage.removeItem(EM); loginView(); }

async function dashboard(){
  el.innerHTML = `<header><div><span class="t">MyFinalPlaybook — Operator Console</span><span class="plane">plane: b2c</span></div>
    <button class="ghost" onclick="logout()">sign out</button></header>
    <main id="main">Loading…</main>`;
  const main = document.getElementById("main");
  try{
    const [m, u] = await Promise.all([api("/api/admin/metrics"), api("/api/admin/users")]);
    const t = m.totals;
    const maxF = Math.max(1, ...m.funnel.map(f=>f.count));
    main.innerHTML = `
    <div class="card"><h2>Business metrics</h2>
      <div class="stats">
        ${stat(t.signups,"Signups")}${stat(t.paidUpgrades,"Paid upgrades")}
        ${stat(t.freeToPaidConversionPct+"%","Free→Paid")}${stat(t.assessmentsCompleted,"Assessments")}
        ${stat(t.chatMessages,"AI messages")}${stat(t.upgradePrompts,"Paywall hits")}
      </div>
    </div>
    <div class="chartgrid">
      <div class="card"><h2>Activity (last 14 days)</h2>${lineChart(m.timeseries)}</div>
      <div class="card"><h2>Free vs Paid</h2>${donut(u.users)}</div>
    </div>
    <div class="card funnel"><h2>Conversion funnel</h2>
      ${m.funnel.map(f=>`<div class="row"><div class="lbl">${esc(f.step)}</div>
        <div class="bar" style="width:${Math.round(320*f.count/maxF)}px"></div><div class="c">${f.count}</div></div>`).join("")}
    </div>
    <div class="card"><h2>Users (${u.count})</h2>
      <table><thead><tr><th>Email</th><th>Tier</th><th>AI used</th><th>Plans</th><th></th></tr></thead><tbody>
      ${u.users.map(x=>`<tr>
        <td>${esc(x.email)}</td>
        <td><span class="pill ${x.tier}">${x.tier}</span></td>
        <td>${x.chatUsed}</td><td>${x.personalizeUsed}</td>
        <td><button class="ghost" onclick="viewUser('${esc(x.email)}')">view</button></td>
      </tr>`).join("") || `<tr><td colspan=5 style="color:var(--dim)">No users yet — run the app to generate activity.</td></tr>`}
      </tbody></table>
    </div>
    <div id="detail"></div>`;
  }catch(e){ main.innerHTML = `<div class="card err">${esc(e.message)} ${e.status===401?'<a href="#" onclick="logout()">re-login</a>':''}</div>`; }
}
function stat(n,l){ return `<div class="stat"><div class="n">${esc(n)}</div><div class="l">${esc(l)}</div></div>`; }

async function viewUser(email){
  const d = await api("/api/admin/users/"+encodeURIComponent(email));
  const box = document.getElementById("detail");
  box.innerHTML = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0">${esc(email)} <span class="pill ${d.entitlement.tier}">${d.entitlement.tier}</span></h2>
      <div>
        ${d.entitlement.tier==="paid"
          ? `<button class="ghost" onclick="setTier('${esc(email)}','free')">Revoke paid</button>`
          : `<button onclick="setTier('${esc(email)}','paid')">Grant paid</button>`}
        <button class="ghost" onclick="resetUsage('${esc(email)}')">Reset quota</button>
      </div>
    </div>
    <h3 style="margin-top:16px">Action progress — ${d.completedCount}/${d.totalItems} complete</h3>
    <table><thead><tr><th>Domain</th><th>Action</th><th>Steps</th><th>Status</th></tr></thead><tbody>
    ${(d.progress||[]).map(p=>`<tr>
      <td>${esc(p.domain)}</td><td>${esc((p.action||"").slice(0,60))}…</td>
      <td>${p.stepsDone}/${p.stepsTotal}</td>
      <td class="${p.complete?'done':'todo'}">${p.complete?'✓ done':(p.stepsDone?'in progress':'not started')}</td>
    </tr>`).join("") || `<tr><td colspan=4 style="color:var(--dim)">No saved plan yet.</td></tr>`}
    </tbody></table>
  </div>`;
  box.scrollIntoView({behavior:"smooth"});
}
async function setTier(email,tier){ await api("/api/admin/users/"+encodeURIComponent(email)+"/tier",{method:"POST",body:JSON.stringify({tier})}); dashboard(); }
async function resetUsage(email){ await api("/api/admin/users/"+encodeURIComponent(email)+"/reset-usage",{method:"POST",body:"{}"}); viewUser(email); }

// ── charts (inline SVG, brand palette, colorblind-validated) ──────────────
const C_SIGNUP = "#3b6ea5", C_UPGRADE = "#c08a3e";
const tip = document.createElement("div"); tip.className="tip"; document.body.appendChild(tip);
function showTip(html, ev){ tip.innerHTML=html; tip.style.opacity=1; tip.style.left=(ev.clientX+12)+"px"; tip.style.top=(ev.clientY-8)+"px"; }
function hideTip(){ tip.style.opacity=0; }

function lineChart(series){
  // series: [{date, signups, upgrades, ...}]  -> two lines: signups + upgrades
  const W=560,H=200,PL=34,PR=12,PT=12,PB=26, iw=W-PL-PR, ih=H-PT-PB;
  const n=series.length, max=Math.max(1, ...series.flatMap(d=>[d.signups,d.upgrades]));
  const x=i=> PL + (n<=1?iw/2:iw*i/(n-1));
  const y=v=> PT + ih - ih*v/max;
  const path=key=> series.map((d,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(d[key]).toFixed(1)}`).join(" ");
  const grid=[0,Math.ceil(max/2),max].map(v=>`<line class="grid" x1="${PL}" y1="${y(v)}" x2="${W-PR}" y2="${y(v)}"/><text class="axis" x="${PL-6}" y="${y(v)+3}" text-anchor="end">${v}</text>`).join("");
  const dots=key=>series.map((d,i)=>`<circle class="dot" cx="${x(i)}" cy="${y(d[key])}" r="4" fill="${key==='signups'?C_SIGNUP:C_UPGRADE}"
      onmousemove="showTip('<b>${d.date}</b><br>${key}: ${d[key]}',event)" onmouseleave="hideTip()"/>`).join("");
  const xlabels=series.map((d,i)=> (i%3===0||i===n-1)?`<text class="axis" x="${x(i)}" y="${H-8}" text-anchor="middle">${d.date.slice(5)}</text>`:"").join("");
  return `<div class="legend">
      <span class="k"><span class="sw" style="background:${C_SIGNUP}"></span>Signups</span>
      <span class="k"><span class="sw" style="background:${C_UPGRADE}"></span>Upgrades</span></div>
    <div class="chart"><svg viewBox="0 0 ${W} ${H}">
      ${grid}${xlabels}
      <path d="${path('signups')}" fill="none" stroke="${C_SIGNUP}" stroke-width="2" stroke-linejoin="round"/>
      <path d="${path('upgrades')}" fill="none" stroke="${C_UPGRADE}" stroke-width="2" stroke-linejoin="round"/>
      ${dots('signups')}${dots('upgrades')}
    </svg></div>`;
}

function donut(users){
  const paid=users.filter(u=>u.tier==="paid").length, free=users.length-paid, total=users.length||1;
  const R=54, r=34, cx=70, cy=70, C=2*Math.PI*R;
  const paidLen=C*paid/total;
  return `<div class="chart"><svg viewBox="0 0 140 150">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${C_SIGNUP}" stroke-width="${R-r}"
        onmousemove="showTip('Free: ${free}',event)" onmouseleave="hideTip()"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${C_UPGRADE}" stroke-width="${R-r}"
        stroke-dasharray="${paidLen.toFixed(1)} ${(C-paidLen).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"
        onmousemove="showTip('Paid: ${paid}',event)" onmouseleave="hideTip()"/>
      <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="22" font-weight="700" fill="var(--brand)">${users.length}</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="var(--dim)">users</text>
    </svg></div>
    <div class="legend" style="justify-content:center">
      <span class="k"><span class="sw" style="background:${C_SIGNUP}"></span>Free ${free}</span>
      <span class="k"><span class="sw" style="background:${C_UPGRADE}"></span>Paid ${paid}</span></div>`;
}

if(token && adminEmail){ dashboard(); } else { loginView(); }
</script>
</body>
</html>
